services:
  walker-docs-next:
    container_name: walker-docs-next
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - walker_docs_next_node_modules:/app/node_modules
      - walker_docs_next_cache:/app/.next
    restart: unless-stopped

volumes:
  walker_docs_next_node_modules:
  walker_docs_next_cache:
